apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
  name: MyService-ingress
  annotations:
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
    - host: MyService.infres.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: MyService-service
                port:
                number: MyPort